<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skaner plomb kamera</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:15px;
}

button,input{
width:100%;
padding:15px;
margin:5px 0;
font-size:18px;
border-radius:8px;
}

button{
background:#1976d2;
color:white;
border:0;
}

#reader{
margin-top:20px;
}

.panel{
background:#222;
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Skaner plomb</h1>


<div class="panel">

<input id="rejestracja" placeholder="Numer rejestracyjny">

<input id="operator" placeholder="Operator">


<button onclick="startCamera()">
Uruchom aparat
</button>

</div>


<div id="reader"></div>


<div class="panel">

<h2>Liczniki</h2>

<p>Plomby 01:
<span id="c01">0</span>
</p>

<p>Plomby 05:
<span id="c05">0</span>
</p>

<p>Razem:
<span id="total">0</span>
</p>

<p id="info"></p>

</div>



<script>


let plomby=[];

let scanner;



function startCamera(){


scanner = new Html5Qrcode("reader");


scanner.start(

{
facingMode:"environment"
},

{
fps:10,
qrbox:250
},


(code)=>{


dodaj(code);


},


(error)=>{


}


).catch(err=>{

document.getElementById("info").innerHTML=
"Brak dostępu do aparatu: "+err;

});


}



function dodaj(kod){


if(
!kod.startsWith("01")
&&
!kod.startsWith("05")
){

document.getElementById("info").innerHTML=
"❌ Nieprawidłowa plomba";

return;

}



if(plomby.includes(kod)){


document.getElementById("info").innerHTML=
"⚠️ Ta plomba była już skanowana";

return;

}



plomby.push(kod);


document.getElementById("info").innerHTML=
"✅ Dodano "+kod;


aktualizuj();


}




function aktualizuj(){


document.getElementById("c01").innerHTML=
plomby.filter(x=>x.startsWith("01")).length;


document.getElementById("c05").innerHTML=
plomby.filter(x=>x.startsWith("05")).length;


document.getElementById("total").innerHTML=
plomby.length;


}


</script>


</body>
</html>
